{% extends 'base.html' %}
{% block content %}

<section class="container mx-auto px-6 py-16">
    <h2 class="text-3xl font-semibold text-black mb-8">Shopping Cart Summary</h2>
    <div class="overflow-x-auto">
        <table class="w-full table-auto border-collapse border border-gray-200">
            <thead>
                <tr class="bg-gray-100">
                    <th class="border border-gray-200 px-4 py-2 text-left">Product</th>
                    <th class="border border-gray-200 px-4 py-2 text-left">Quantity</th>
                    <th class="border border-gray-200 px-4 py-2 text-left">Price</th>
                    <th class="border border-gray-200 px-4 py-2 text-left">Total</th>
                </tr>
            </thead>
            <tbody>
                {% for product in cart_items %}
                <tr>
                    <td class="border border-gray-200 px-4 py-2">{{ product }}</td>
                    <td class="border border-gray-200 px-4 py-2">{{  }}</td>
                    <td class="border border-gray-200 px-4 py-2">${{ product.price }}</td>
                    <td class="border border-gray-200 px-4 py-2">${{ product.quantity }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="border border-gray-200 px-4 py-2 text-center">Your cart is empty.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>

{% endblock %}

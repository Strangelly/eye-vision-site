{% extends 'base.html' %}

{% block content %}

<section class="container mx-auto px-6 py-16">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 space-y-6">
            <div class="text-center space-y-2">
                <div class="mx-auto w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h1 class="text-3xl md:text-4xl font-semibold text-gray-900">Update Profile</h1>
                <p>{{ user }}</p>
            </div>

            <form method="POST" class="space-y-4 bg-white p-6 rounded-xl shadow">
                {% csrf_token %}

                    {{ shipping_form.as_p }}
            
                <div class="flex gap-4 pt-4">
                    <a href="{% url 'user' %}" 
                       class="flex-1 rounded-full border border-gray-300 px-6 py-3 text-center text-gray-700 font-medium hover:bg-gray-50 transition">
                        Cancel
                    </a>
                    <button type="submit" 
                            class="flex-1 rounded-full bg-blue-500 px-6 py-3 text-white font-medium hover:bg-blue-600 transition shadow-lg hover:shadow-xl">
                        Update Profile
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

{% if messages %}
    <div class="fixed bottom-6 right-6 space-y-3 z-50">
        {% for message in messages %}
            <div class="toast-message rounded-2xl bg-white px-5 py-3 shadow-lg border-l-4 border-blue-500 text-sm text-gray-700 transition-all duration-300">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}


{% endblock %}

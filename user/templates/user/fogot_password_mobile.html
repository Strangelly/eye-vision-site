{% extends 'base.html' %}

{% block content %}

<section class="container mx-auto px-6 py-16">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 space-y-6">
            <div class="text-center space-y-3">
                <div class="mx-auto w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                    </svg>
                </div>
                <h1 class="text-3xl md:text-4xl font-semibold text-gray-900">Forgot Password</h1>
                <p class="text-gray-600">Enter your mobile number to receive an OTP</p>
            </div>

            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="mobile" class="block text-sm font-medium text-gray-700 mb-2">Mobile Number</label>
                    <input type="text" 
                           name="mobile" 
                           id="mobile"
                           placeholder="Enter your registered mobile number"
                           class="w-full rounded-full border border-gray-300 px-5 py-3 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200 transition"
                           required>
                    <p class="mt-2 text-xs text-gray-500 text-center">We'll send an OTP to verify your mobile number</p>
                </div>

                <button type="submit" 
                        class="w-full rounded-full bg-blue-500 px-6 py-3 text-white font-medium hover:bg-blue-600 transition shadow-lg hover:shadow-xl">
                    Send OTP
                </button>
            </form>

            <div class="pt-4 border-t border-gray-200 text-center">
                <a href="{% url 'login' %}" 
                   class="text-sm text-blue-500 hover:text-blue-600 hover:underline">
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</section>

{% if messages %}
    <div class="fixed bottom-6 right-6 space-y-3 z-50">
        {% for message in messages %}
            <div class="toast-message rounded-2xl bg-white px-5 py-3 shadow-lg border-l-4 border-blue-500 text-sm text-gray-700 transition-all duration-300">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

{% endblock %}

{% extends 'base.html' %}

{% block content %}

<section class="container mx-auto px-6 py-16">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 space-y-6">
            <div class="text-center space-y-2">
                <h1 class="text-3xl md:text-4xl font-semibold text-gray-900">Welcome Back</h1>
                <p class="text-gray-600">Sign in to your account to continue</p>
            </div>

            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Mobile Number</label>
                    <input type="text" 
                           name="username" 
                           id="username"
                           placeholder="Enter your mobile number"
                           class="w-full rounded-full border border-gray-300 px-5 py-3 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200 transition"
                           required>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" 
                           name="password" 
                           id="password"
                           placeholder="Enter your password"
                           class="w-full rounded-full border border-gray-300 px-5 py-3 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200 transition"
                           required>
                </div>

                <button type="submit" 
                        class="w-full rounded-full bg-blue-500 px-6 py-3 text-white font-medium hover:bg-blue-600 transition shadow-lg hover:shadow-xl">
                    Sign In
                </button>
            </form>

            <div class="space-y-3 pt-4 border-t border-gray-200">
                <a href="{% url 'varify_mobile' %}" 
                   class="block text-center text-sm text-blue-500 hover:text-blue-600 hover:underline">
                    Forgot Password?
                </a>
                <p class="text-center text-sm text-gray-600">
                    Don't have an account? 
                    <a href="{% url 'registration' %}" class="font-semibold text-blue-500 hover:text-blue-600 hover:underline">
                        Register here
                    </a>
                </p>
            </div>
        </div>
    </div>
</section>

{% if messages %}
    <div class="fixed bottom-6 right-6 space-y-3 z-50">
        {% for message in messages %}
            <div class="toast-message rounded-2xl bg-white px-5 py-3 shadow-lg border-l-4 border-blue-500 text-sm text-gray-700 transition-all duration-300">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

{% endblock %}
